<div class="contact-modal" id="contacts">
  <a href="#close" class="contact-modal__overlay"></a>
  <div class="contact-modal__content">
    <div class="contact-modal__left">
      <div class="contact-modal__label">Get In Touch</div>
      <h2 class="contact-modal__title">
        Let’s Build Something Great Together
      </h2>
      <p class="contact-modal__description">
        Tell us about your project. We’ll get back to you within 24 hours and help you plan the next steps.
      </p>
    </div>
    <form class="contact-modal__form">
      <input type="text" class="contact-modal__input" placeholder="Your Name" required>
      <input type="email" class="contact-modal__input" placeholder="Email Address" required>
      <textarea class="contact-modal__textarea" placeholder="Project Description"></textarea>
      <button class="button button--primary" type="submit">
        Send Message
      </button>
    </form>
    <a href="#close" class="contact-modal__close">✕</a>
  </div>
</div>
